/* ---------- Modal helpers ---------- */
function modal(title,body){
  document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" role="dialog" aria-modal="true" aria-label="${String(title||'Dialog').replace(/<[^>]*>/g,'').replace(/"/g,'')}" tabindex="-1"><div class="modal-head"><h2 style="font-size:19px">${title}</h2><button class="x" aria-label="Close" onclick="closeModal()">×</button></div>
    <div class="modal-body">${body}</div></div></div>`;
  try{ var m=document.querySelector('#modal-root .modal'); if(m) m.focus(); a11yEnhance(document.getElementById('modal-root')); }catch(e){}
}
function closeModal(){ document.getElementById('modal-root').innerHTML=""; }

/* ============================================================
   LIVE SOCIAL-PROOF TOASTS + POLICY PLACEMENTS
   ============================================================ */
function toastWrap(){ let w=document.getElementById('toast-wrap'); if(!w){ w=document.createElement('div'); w.id='toast-wrap'; document.body.appendChild(w); } return w; }
function showToast(html,ms=5000){
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML='<button class="toast-x" aria-label="Dismiss">×</button>'+html;
  toastWrap().appendChild(t); requestAnimationFrame(()=>t.classList.add('show'));
  const close=()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),320); };
  const timer=setTimeout(close, ms);
  t.querySelector('.toast-x').onclick=()=>{ clearTimeout(timer); close(); };
}
function placements(){ return DB.get('placements',[]); }
function placementToast(p){
  const kind=`${p.freshTag||'Fresh'} ${p.category||'life'}`.trim();
  const ap=p.ap?`<b>$${(+p.ap).toLocaleString()}/yr</b> AP `:'';
  showToast(`<div><i class="ph-bold ph-seal-check tic"></i><b>Policy placed!</b></div>
    <div class="tmeta">An agent in <b>${p.state}</b> just placed a ${ap}policy with <b>${p.carrier}</b><br><span style="color:var(--teal);font-weight:600">${kind} lead</span></div>`, 8000);
}
function addPlacement(p){
  const arr=placements(); arr.unshift(p); DB.set('placements',arr.slice(0,60));
  placementToast(p);
  // broadcast to other open tabs (closest thing to cross-user without a backend)
  try{ localStorage.setItem('anka_place_ping', JSON.stringify({...p,_t:Date.now()})); }catch(e){}
}
window.addEventListener('storage',e=>{ if(e.key==='anka_place_ping' && e.newValue){ try{ placementToast(JSON.parse(e.newValue)); }catch(_){} } });
/* seed a few sample placements so visitors see live activity */
function seedPlacements(){
  if(placements().length) return;
  const S=["TX","FL","GA","OH","NC","AZ","PA","CA","MI","TN"], C=["Mutual of Omaha","Americo","American Amicable","Corebridge Financial (AIG)","Foresters Financial","Transamerica","Gerber Life","Banner Life (Legal & General)"], K=["Final Expense","Term Life","Mortgage Protection","Veteran","Senior / Medicare"], FR=["Fresh","Aged","Aged"];
  const arr=[]; for(let i=0;i<24;i++){ arr.push({state:rnd(S),carrier:rnd(C),category:rnd(K),freshTag:rnd(FR),ap:120*Math.floor(5+Math.random()*18),seed:true}); }
  DB.set('placements',arr);
}
/* rotate a social-proof toast periodically (gives the "live" feel) */
let _spTimer=null;
function startSocialProof(){
  if(_spTimer) return;
  const tick=()=>{ const arr=placements(); if(arr.length){ placementToast(arr[Math.floor(Math.random()*Math.min(arr.length,24))]); } };
  setTimeout(tick, 6000);
  _spTimer=setInterval(tick, 22000);
}

/* ---------- utils ---------- */
function val(id){const e=document.getElementById(id);return e?e.value.trim():""}
function filterList(inp,sel){const q=inp.value.toLowerCase();document.querySelectorAll(sel+' label').forEach(l=>{l.style.display=l.textContent.toLowerCase().includes(q)?'':'none';});}
/* Reusable toggle-chip pickers for states & carriers */
function statePicker(id, cls, selected){
  selected=selected||[];
  return `<div class="picker">
    <div class="picker-bar"><span class="picker-count" id="${id}_n">${selected.length} selected</span>
      <span><a onclick="pickAll('#${id}','${cls}',true)">Select all</a> &nbsp;·&nbsp; <a onclick="pickAll('#${id}','${cls}',false)">Clear</a></span></div>
    <div class="checks" id="${id}" onchange="pickCount('#${id}','${cls}')">
      ${STATES.map(s=>`<label><input type="checkbox" class="${cls}" value="${s}" ${selected.includes(s)?'checked':''}> ${s}</label>`).join("")}
    </div></div>`;
}
function carrierPicker(id, cls, selected){
  selected=selected||[];
  return `<div class="picker">
    <div class="picker-bar"><span class="picker-count" id="${id}_n">${selected.length} selected</span>
      <input class="picker-search" oninput="filterList(this,'#${id}')" placeholder="Search ${CARRIERS.length} carriers…">
      <a onclick="pickAll('#${id}','${cls}',false)">Clear</a></div>
    <div class="checks" id="${id}" onchange="pickCount('#${id}','${cls}')">
      ${CARRIERS.map(c=>`<label><input type="checkbox" class="${cls}" value="${c}" ${selected.includes(c)?'checked':''}> ${c}</label>`).join("")}
    </div></div>`;
}
function pickCount(sel,cls){ const n=document.getElementById(sel.replace('#','')+'_n'); if(n) n.textContent=document.querySelectorAll(sel+' .'+cls+':checked').length+' selected'; }
function pickAll(sel,cls,val){ document.querySelectorAll(sel+' label').forEach(l=>{ if(l.style.display!=='none'){ const cb=l.querySelector('input.'+cls); if(cb) cb.checked=val; } }); pickCount(sel,cls); }

let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); _deferredPrompt=e; showInstallBtn(); });
function showInstallBtn(){
  if(document.getElementById('pwaInstall')) return;
  const b=document.createElement('button'); b.id='pwaInstall';
  b.innerHTML='<i class="ph-bold ph-device-mobile"></i> Install app';
  b.style.cssText='position:fixed;bottom:18px;right:18px;z-index:300;background:linear-gradient(135deg,#e0a23c,#c8862a);color:#082a2b;font-weight:800;border:none;border-radius:30px;padding:12px 18px;box-shadow:0 10px 26px rgba(0,0,0,.28);cursor:pointer;font-family:inherit;font-size:14px;display:flex;align-items:center;gap:8px';
  b.onclick=async()=>{ if(_deferredPrompt){ _deferredPrompt.prompt(); await _deferredPrompt.userChoice; _deferredPrompt=null; b.remove(); } };
  document.body.appendChild(b);
}
window.addEventListener('appinstalled',()=>{ const b=document.getElementById('pwaInstall'); if(b)b.remove(); });
(function iosInstallHint(){
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const standalone=window.navigator.standalone||matchMedia('(display-mode: standalone)').matches;

    d.querySelector('button').onclick=()=>{ DB.set('iosHintDismissed',true); d.remove(); };
    document.body.appendChild(d);
  }
})();
